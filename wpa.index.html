<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#1a1a1a">
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#181818; --bg2:#1e1e1e; --card:#232323; --card2:#282828;
  --border:#333; --border2:#3d3d3d;
  --text:#d4d4d4; --text2:#aaa; --muted:#666;
  --green:#6dbf8a; --red:#c96a6a;
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
  --f:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--f);font-size:13px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.6}

nav{padding:calc(var(--safe-top) + 10px) 0 0;background:var(--bg);border-bottom:1px solid var(--border);display:flex;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:10px 2px 9px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--f);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:color .15s,border-color .15s}
.tab.active{color:var(--text);border-bottom-color:var(--text2)}

.page{display:none;padding:16px 16px calc(var(--safe-bot)+80px);max-width:600px;margin:0 auto}
.page.active{display:block}

.s-head{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);padding:8px 12px;border:1px solid var(--border);border-bottom:none;background:var(--card);margin-top:18px}
.s-head:first-child{margin-top:0}

.df-card{border:1px solid var(--border);background:var(--card)}
.df-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.df-row:last-child{border-bottom:none}
.df-row:active{background:var(--card2)}
.df-arrow{color:var(--muted);font-size:11px;flex-shrink:0}
.df-amount{font-size:13px;font-weight:500;white-space:nowrap;margin-left:auto;padding-left:10px}
.df-amount.pos{color:var(--green)}
.df-amount.neg{color:var(--red)}
.df-amount.neu{color:var(--text2)}

.hero{border:1px solid var(--border);background:var(--card);padding:20px 14px 16px}
.hero-lbl{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.hero-num{font-size:36px;font-weight:600;letter-spacing:-0.02em;color:var(--text);line-height:1}
.hero-num.neg{color:var(--red)}

.stat-row{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-top:none}
.stat-cell{padding:10px 12px;border-right:1px solid var(--border)}
.stat-cell:last-child{border-right:none}
.stat-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:16px;font-weight:500}
.stat-val.inc{color:var(--green)}
.stat-val.exp{color:var(--text2)}

.month-row{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);border-bottom:none;background:var(--bg);padding:7px 10px}
.mnav-btn{background:none;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:var(--f);transition:color .12s,border-color .12s}
.mnav-btn:hover{color:var(--text);border-color:var(--border2)}
.month-lbl{font-size:11px;letter-spacing:0.1em;color:var(--text2)}

.empty{padding:28px 12px;text-align:center;font-size:11px;color:var(--muted);letter-spacing:0.08em;border:1px solid var(--border);background:var(--card)}

.cat-bar-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border)}
.cat-bar-row:last-child{border-bottom:none}
.cat-bar-name{font-size:11px;color:var(--text2);min-width:72px}
.cat-track{flex:1;height:1px;background:var(--border2);position:relative}
.cat-fill{position:absolute;top:0;left:0;height:1px;background:var(--text2);transition:width .4s}
.cat-bar-amt{font-size:11px;color:var(--muted);min-width:52px;text-align:right}

.fab{position:fixed;bottom:calc(var(--safe-bot)+20px);right:16px;width:44px;height:44px;background:var(--text);color:var(--bg);border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;font-family:var(--f);transition:opacity .12s,transform .1s}
.fab:active{opacity:.8;transform:scale(.94)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30;display:none;align-items:flex-end}
.overlay.open{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.sheet{background:var(--bg2);border-top:1px solid var(--border2);padding:20px 16px calc(var(--safe-bot)+24px);width:100%;max-width:600px;margin:0 auto;animation:slideUp .2s cubic-bezier(.32,.72,0,1);max-height:92dvh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.sh-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.sh-title{font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text)}
.sh-close{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:var(--f)}

.type-toggle{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);margin-bottom:14px}
.type-btn{padding:9px;background:none;border:none;color:var(--muted);font-family:var(--f);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:background .12s,color .12s}
.type-btn:first-child{border-right:1px solid var(--border)}
.type-btn.active{background:var(--card);color:var(--text)}

.fg{margin-bottom:12px}
.fl{display:block;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}

input,select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:0;color:var(--text);font-family:var(--f);font-size:13px;padding:10px 11px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--border2)}
select option{background:var(--card)}

.pfx-wrap{display:flex}
.pfx{background:var(--card);border:1px solid var(--border);border-right:none;padding:10px;color:var(--muted);font-size:13px;flex-shrink:0}

.emoji-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;margin-top:6px}
.emoji-opt{aspect-ratio:1;background:var(--card);border:1px solid transparent;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .1s}
.emoji-opt:hover{border-color:var(--border2)}
.emoji-opt.selected{border-color:var(--text)}

.btn-save{width:100%;background:var(--text);color:var(--bg);border:none;padding:12px;font-family:var(--f);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .12s}
.btn-save:active{opacity:.8}
.btn-del{width:100%;background:none;color:var(--red);border:1px solid #3a2020;padding:11px;font-family:var(--f);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:border-color .12s}
.btn-del:hover{border-color:var(--red)}
</style>
</head>
<body>

<nav>
  <button class="tab active" onclick="showPage('overview')">Overview</button>
  <button class="tab" onclick="showPage('transactions')">Ledger</button>
  <button class="tab" onclick="showPage('accounts')">Accounts</button>
  <button class="tab" onclick="showPage('recurring')">Recurring</button>
</nav>

<!-- OVERVIEW -->
<div class="page active" id="page-overview">
  <div class="month-row">
    <button class="mnav-btn" id="prevMonth">&#8249;</button>
    <span class="month-lbl" id="monthLabel"></span>
    <button class="mnav-btn" id="nextMonth">&#8250;</button>
  </div>
  <div class="hero"><div class="hero-lbl">Net Balance</div><div class="hero-num" id="balanceAmt">&#8364;0.00</div></div>
  <div class="stat-row">
    <div class="stat-cell"><div class="stat-lbl">Income</div><div class="stat-val inc" id="incomeAmt">&#8364;0.00</div></div>
    <div class="stat-cell"><div class="stat-lbl">Expenses</div><div class="stat-val exp" id="expenseAmt">&#8364;0.00</div></div>
  </div>
  <div class="s-head" id="catHead" style="display:none">Category Breakdown</div>
  <div class="df-card" id="catCard" style="display:none"><div id="catList"></div></div>
  <div class="s-head">Recent Transactions</div>
  <div class="df-card"><div id="recentList"></div></div>
</div>

<!-- LEDGER -->
<div class="page" id="page-transactions">
  <div class="s-head" style="margin-top:0">All Transactions</div>
  <div class="df-card"><div id="allTxList"></div></div>
</div>

<!-- ACCOUNTS -->
<div class="page" id="page-accounts">
  <div class="s-head" style="margin-top:0">Your Accounts</div>
  <div class="df-card"><div id="accList"></div></div>
  <button class="btn-save" style="margin-top:10px" onclick="openAddAccount()">+ Add Account</button>
</div>

<!-- RECURRING -->
<div class="page" id="page-recurring">
  <div class="s-head" style="margin-top:0">Recurring Templates</div>
  <div class="df-card"><div id="recurList"></div></div>
  <button class="btn-save" style="margin-top:10px" onclick="openAddRecur()">+ Add Recurring</button>
</div>

<!-- Due banner -->
<div id="dueBanner" style="display:none;position:fixed;bottom:calc(var(--safe-bot) + 76px);left:16px;right:16px;max-width:568px;margin:0 auto;z-index:25">
  <div style="background:var(--card2);border:1px solid var(--border2);padding:12px 14px">
    <div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Due This Month</div>
    <div id="dueList" style="margin-bottom:10px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn-save" style="margin-top:0;flex:1;padding:9px" onclick="applyAllDue()">Apply All</button>
      <button class="btn-del" style="margin-top:0;flex:1;padding:8px;border:1px solid var(--border)" onclick="dismissDue()">Dismiss</button>
    </div>
  </div>
</div>

<button class="fab" id="addTxBtn">+</button>

<!-- Transaction sheet -->
<div class="overlay" id="txOverlay">
  <div class="sheet">
    <div class="sh-top">
      <span class="sh-title" id="txShTitle">New Entry</span>
      <button class="sh-close" onclick="closeTxSheet()">&#10005;</button>
    </div>
    <div class="type-toggle">
      <button class="type-btn active" id="expBtn" onclick="setType('expense')">Expense</button>
      <button class="type-btn" id="incBtn" onclick="setType('income')">Income</button>
    </div>
    <div class="fg"><label class="fl">Amount</label>
      <div class="pfx-wrap"><span class="pfx">&#8364;</span><input type="number" id="txAmount" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
    </div>
    <div class="fg"><label class="fl">Description</label><input type="text" id="txName" placeholder="e.g. Coffee, Rent, Salary"></div>
    <div class="fg"><label class="fl">Account</label><select id="txAccount"></select></div>
    <div class="fg"><label class="fl">Category</label><select id="txCat"></select></div>
    <div class="fg"><label class="fl">Date</label><input type="date" id="txDate"></div>
    <div class="fg"><label class="fl">Icon</label><div class="emoji-grid" id="txEmoji"></div></div>
    <button class="btn-save" onclick="saveTx()">Save Entry</button>
    <button class="btn-del" id="txDelBtn" style="display:none" onclick="deleteTx()">Delete Entry</button>
  </div>
</div>

<!-- Account sheet -->
<div class="overlay" id="accOverlay">
  <div class="sheet">
    <div class="sh-top">
      <span class="sh-title" id="accShTitle">New Account</span>
      <button class="sh-close" onclick="closeAccSheet()">&#10005;</button>
    </div>
    <div class="fg"><label class="fl">Account Name</label><input type="text" id="accName" placeholder="e.g. Revolut, MetaMask, Wallet"></div>
    <div class="fg"><label class="fl">Type</label>
      <select id="accType">
        <option value="bank">Bank Account</option>
        <option value="crypto">Crypto Wallet</option>
        <option value="cash">Cash</option>
        <option value="savings">Savings</option>
        <option value="investment">Investment</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Currency / Token</label><input type="text" id="accCurrency" placeholder="e.g. EUR, BTC, ETH"></div>
    <div class="fg"><label class="fl">Icon</label><div class="emoji-grid" id="accEmoji"></div></div>
    <button class="btn-save" onclick="saveAccount()">Save Account</button>
    <button class="btn-del" id="accDelBtn" style="display:none" onclick="deleteAccount()">Delete Account</button>
  </div>
</div>

<!-- Recurring sheet -->
<div class="overlay" id="recurOverlay">
  <div class="sheet">
    <div class="sh-top">
      <span class="sh-title" id="recurShTitle">New Recurring</span>
      <button class="sh-close" onclick="closeRecurSheet()">&#10005;</button>
    </div>
    <div class="type-toggle">
      <button class="type-btn active" id="recurExpBtn" onclick="setRecurType('expense')">Expense</button>
      <button class="type-btn" id="recurIncBtn" onclick="setRecurType('income')">Income</button>
    </div>
    <div class="fg"><label class="fl">Name</label><input type="text" id="recurName" placeholder="e.g. Netflix, Rent, Salary"></div>
    <div class="fg"><label class="fl">Amount</label>
      <div class="pfx-wrap"><span class="pfx">&#8364;</span><input type="number" id="recurAmount" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
    </div>
    <div class="fg"><label class="fl">Account</label><select id="recurAccount"></select></div>
    <div class="fg"><label class="fl">Category</label><select id="recurCat"></select></div>
    <div class="fg"><label class="fl">Frequency</label>
      <select id="recurFreq">
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Day of Month</label>
      <input type="number" id="recurDay" placeholder="e.g. 1, 15, 28" min="1" max="31" inputmode="numeric">
    </div>
    <div class="fg"><label class="fl">Icon</label><div class="emoji-grid" id="recurEmoji"></div></div>
    <button class="btn-save" onclick="saveRecur()">Save Template</button>
    <button class="btn-del" id="recurDelBtn" style="display:none" onclick="deleteRecur()">Delete Template</button>
  </div>
</div>

<script>
const EXPENSE_CATS = ['Food','Transport','Housing','Health','Entertainment','Shopping','Utilities','Subscriptions','Other'];
const INCOME_CATS  = ['Salary','Freelance','Gift','Investment','Crypto','Other'];
const EXP_EMOJIS   = ['🍕','🍔','☕','🛒','🚌','🚗','⛽','🏠','💊','💆','🎬','🎮','👗','👟','📱','💡','🔧','📦','🐶','✈️','🏋️','📚','🍺','🎵','🎁','💸','🏥','🧴','🍜','🥤'];
const INC_EMOJIS   = ['💼','💵','🤝','📈','🎁','🏦','💻','🎓','🏆','⭐','🌟','✨'];
const ACC_EMOJIS   = ['🏦','💳','💵','🪙','💰','🏧','📊','💎','🔑','🌐','🏠','📱','💼','📉','🏪'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let txs      = JSON.parse(localStorage.getItem('bgt_txs')    || '[]');
let accounts = JSON.parse(localStorage.getItem('bgt_accs')   || '[]');
let recurs   = JSON.parse(localStorage.getItem('bgt_recurs') || '[]');

let now = new Date(), vy = now.getFullYear(), vm = now.getMonth();
let editTxId = null, editAccId = null, editRecurId = null;
let curType = 'expense', curRecurType = 'expense';
let selTxEmoji = EXP_EMOJIS[0], selAccEmoji = ACC_EMOJIS[0], selRecurEmoji = EXP_EMOJIS[0];
let dueDismissedKey = null;

if (!accounts.length) {
  accounts = [
    {id:'acc_cash', name:'Cash',         type:'cash', currency:'EUR', emoji:'💵'},
    {id:'acc_bank', name:'Bank Account', type:'bank', currency:'EUR', emoji:'🏦'},
  ];
  savAccs();
}

function savTxs()   { localStorage.setItem('bgt_txs',    JSON.stringify(txs)); }
function savAccs()  { localStorage.setItem('bgt_accs',   JSON.stringify(accounts)); }
function savRecurs(){ localStorage.setItem('bgt_recurs', JSON.stringify(recurs)); }
function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmt(n)     { return '€' + Math.abs(n).toFixed(2); }
function mkey(y,m)  { return y + '-' + String(m+1).padStart(2,'0'); }
function fdate(d)   { const p=d.split('-'); return parseInt(p[2])+' '+MONTHS[parseInt(p[1])-1].slice(0,3).toUpperCase()+' '+p[0]; }
function accById(id){ return accounts.find(a=>a.id===id); }
function accName(id){ const a=accById(id); return a?a.name:'—'; }
function accEmoji(id){ const a=accById(id); return a?a.emoji:'💳'; }

// ── Page routing ──────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelector('.tab[onclick="showPage(\''+name+'\')"]').classList.add('active');
  document.getElementById('addTxBtn').style.display = (name==='accounts'||name==='recurring') ? 'none' : 'flex';
  if (name==='transactions') renderAllTx();
  if (name==='accounts')     renderAccounts();
  if (name==='recurring')    renderRecurring();
}

// ── Overview ──────────────────────────────────────────────────────────
function render() {
  document.getElementById('monthLabel').textContent = MONTHS[vm].slice(0,3).toUpperCase()+' '+vy;
  const key  = mkey(vy, vm);
  const mtxs = txs.filter(t=>t.date.startsWith(key)).sort((a,b)=>b.date.localeCompare(a.date));
  let inc=0, exp=0;
  mtxs.forEach(t => t.type==='income' ? inc+=t.amount : exp+=t.amount);
  const bal = inc - exp;
  const bel = document.getElementById('balanceAmt');
  bel.textContent = (bal<0?'-':'') + fmt(bal);
  bel.className   = 'hero-num' + (bal<0?' neg':'');
  document.getElementById('incomeAmt').textContent  = fmt(inc);
  document.getElementById('expenseAmt').textContent = fmt(exp);

  const catMap={};
  mtxs.filter(t=>t.type==='expense').forEach(t=>{ catMap[t.category]=(catMap[t.category]||0)+t.amount; });
  const cE = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const mx = cE[0]?.[1]||1;
  const cH=document.getElementById('catHead'), cC=document.getElementById('catCard');
  if (cE.length) {
    cH.style.display=''; cC.style.display='';
    document.getElementById('catList').innerHTML = cE.map(([c,a])=>
      '<div class="cat-bar-row"><span class="cat-bar-name">'+c+'</span><div class="cat-track"><div class="cat-fill" style="width:'+(a/mx*100).toFixed(1)+'%"></div></div><span class="cat-bar-amt">'+fmt(a)+'</span></div>'
    ).join('');
  } else { cH.style.display='none'; cC.style.display='none'; }

  const recent = mtxs.slice(0,5);
  document.getElementById('recentList').innerHTML = recent.length ? recent.map(txRow).join('') : '<div class="empty">NO ENTRIES THIS MONTH</div>';
}

function txRow(t) {
  return '<div class="df-row" onclick="openEditTx(\''+t.id+'\')">'+
    '<span style="font-size:18px;flex-shrink:0">'+t.emoji+'</span>'+
    '<span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;font-weight:500">'+t.name+'</span>'+
    '<span class="df-arrow">&#8594;</span>'+
    '<span style="font-size:11px;color:var(--muted);white-space:nowrap">'+accEmoji(t.account)+' '+accName(t.account)+'</span>'+
    '<span class="df-amount '+(t.type==='income'?'pos':'neu')+'">'+(t.type==='income'?'+':'-')+fmt(t.amount)+'</span>'+
    '</div>';
}

// ── Ledger ────────────────────────────────────────────────────────────
function renderAllTx() {
  const s = [...txs].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('allTxList').innerHTML = s.length ? s.map(t=>
    '<div class="df-row" onclick="openEditTx(\''+t.id+'\')">'+
    '<span style="font-size:17px;flex-shrink:0">'+t.emoji+'</span>'+
    '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+t.name+'</div>'+
    '<div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.05em">'+t.category.toUpperCase()+' · '+fdate(t.date)+'</div></div>'+
    '<span class="df-amount '+(t.type==='income'?'pos':'neu')+'">'+(t.type==='income'?'+':'-')+fmt(t.amount)+'</span>'+
    '</div>'
  ).join('') : '<div class="empty">NO ENTRIES YET</div>';
}

// ── Accounts ──────────────────────────────────────────────────────────
function renderAccounts() {
  const balMap={};
  accounts.forEach(a=>{ balMap[a.id]=0; });
  txs.forEach(t=>{ if(t.account&&balMap[t.account]!==undefined) balMap[t.account]+= t.type==='income'?t.amount:-t.amount; });
  document.getElementById('accList').innerHTML = accounts.length ? accounts.map(a=>{
    const b=balMap[a.id]||0;
    return '<div class="df-row" onclick="openEditAcc(\''+a.id+'\')">'+
      '<span style="font-size:20px;flex-shrink:0">'+a.emoji+'</span>'+
      '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500">'+a.name+'</div>'+
      '<div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.06em">'+a.type.toUpperCase()+' · '+a.currency+'</div></div>'+
      '<span class="df-amount '+(b>=0?'pos':'neg')+'">'+(b>=0?'+':'')+fmt(b)+'</span>'+
      '</div>';
  }).join('') : '<div class="empty">NO ACCOUNTS YET</div>';
}

// ── Recurring ─────────────────────────────────────────────────────────
function renderRecurring() {
  document.getElementById('recurList').innerHTML = recurs.length ? recurs.map(r=>
    '<div class="df-row" onclick="openEditRecur(\''+r.id+'\')">'+
    '<span style="font-size:18px;flex-shrink:0">'+r.emoji+'</span>'+
    '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500">'+r.name+'</div>'+
    '<div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.05em">'+r.freq.toUpperCase()+' · '+r.category.toUpperCase()+' · DAY '+r.day+'</div></div>'+
    '<span class="df-amount '+(r.type==='income'?'pos':'neu')+'">'+(r.type==='income'?'+':'-')+fmt(r.amount)+'</span>'+
    '</div>'
  ).join('') : '<div class="empty">NO RECURRING TEMPLATES YET</div>';
}

function getDue() {
  const n=new Date(), y=n.getFullYear(), m=n.getMonth(), key=mkey(y,m);
  return recurs.filter(r=>{
    if (r.freq==='monthly') return !txs.some(t=>t.recurId===r.id&&t.date.startsWith(key));
    if (r.freq==='yearly')  return !txs.some(t=>t.recurId===r.id&&t.date.startsWith(y+'-'));
    return false;
  });
}

function checkDue() {
  const n=new Date(), k=mkey(n.getFullYear(),n.getMonth());
  if (localStorage.getItem('bgt_dismissed')===k) return;
  const due=getDue(); if (!due.length) return;
  dueDismissedKey=k;
  document.getElementById('dueList').innerHTML = due.map(r=>
    '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">'+
    '<span style="font-size:15px">'+r.emoji+'</span>'+
    '<span style="flex:1;font-size:11px;color:var(--text2)">'+r.name+'</span>'+
    '<span style="font-size:11px;color:'+(r.type==='income'?'var(--green)':'var(--text2)')+'">'+
    (r.type==='income'?'+':'-')+fmt(r.amount)+'</span></div>'
  ).join('');
  document.getElementById('dueBanner').style.display='';
}

function applyAllDue() {
  const n=new Date(), y=n.getFullYear(), m=n.getMonth();
  getDue().forEach(r=>{
    const d=String(Math.min(r.day||1,28)).padStart(2,'0');
    txs.push({id:uid(),amount:r.amount,name:r.name,category:r.category,
      date:y+'-'+String(m+1).padStart(2,'0')+'-'+d,
      emoji:r.emoji,type:r.type,account:r.account,recurId:r.id});
  });
  savTxs(); dismissDue(); render();
}

function dismissDue() {
  localStorage.setItem('bgt_dismissed', dueDismissedKey);
  document.getElementById('dueBanner').style.display='none';
}

// ── Transaction sheet ─────────────────────────────────────────────────
function openAddTx() {
  editTxId=null;
  document.getElementById('txShTitle').textContent='New Entry';
  document.getElementById('txAmount').value='';
  document.getElementById('txName').value='';
  document.getElementById('txDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('txDelBtn').style.display='none';
  setType('expense');
  fillAccSelect('txAccount');
  document.getElementById('txOverlay').classList.add('open');
}

function openEditTx(id) {
  const t=txs.find(x=>x.id===id); if(!t) return;
  editTxId=id;
  document.getElementById('txShTitle').textContent='Edit Entry';
  document.getElementById('txAmount').value=t.amount;
  document.getElementById('txName').value=t.name;
  document.getElementById('txDate').value=t.date;
  document.getElementById('txDelBtn').style.display='';
  setType(t.type,t.category,t.emoji);
  fillAccSelect('txAccount',t.account);
  document.getElementById('txOverlay').classList.add('open');
}

function closeTxSheet() { document.getElementById('txOverlay').classList.remove('open'); }

function setType(type, precat, preemoji) {
  curType=type;
  document.getElementById('expBtn').classList.toggle('active',type==='expense');
  document.getElementById('incBtn').classList.toggle('active',type==='income');
  const cats=type==='expense'?EXPENSE_CATS:INCOME_CATS;
  const cs=document.getElementById('txCat');
  cs.innerHTML=cats.map(c=>'<option>'+c+'</option>').join('');
  if(precat&&cats.includes(precat)) cs.value=precat;
  const emojis=type==='expense'?EXP_EMOJIS:INC_EMOJIS;
  selTxEmoji=preemoji||emojis[0];
  document.getElementById('txEmoji').innerHTML=emojis.map(e=>'<button class="emoji-opt'+(e===selTxEmoji?' selected':'')+'" onclick="pickEmoji(\'tx\',\''+e+'\')" type="button">'+e+'</button>').join('');
}

function saveTx() {
  const amount=parseFloat(document.getElementById('txAmount').value);
  const name=document.getElementById('txName').value.trim();
  const cat=document.getElementById('txCat').value;
  const date=document.getElementById('txDate').value;
  const account=document.getElementById('txAccount').value;
  if(!amount||amount<=0||!name||!date){alert('Fill in all fields.');return;}
  if(editTxId){
    const i=txs.findIndex(t=>t.id===editTxId);
    txs[i]={...txs[i],amount,name,category:cat,date,emoji:selTxEmoji,type:curType,account};
  } else {
    txs.push({id:uid(),amount,name,category:cat,date,emoji:selTxEmoji,type:curType,account});
  }
  savTxs(); closeTxSheet(); render();
}

function deleteTx() {
  if(!editTxId||!confirm('Delete this entry?'))return;
  txs=txs.filter(t=>t.id!==editTxId);
  savTxs(); closeTxSheet(); render();
}

// ── Account sheet ─────────────────────────────────────────────────────
function openAddAccount() {
  editAccId=null;
  document.getElementById('accShTitle').textContent='New Account';
  document.getElementById('accName').value='';
  document.getElementById('accType').value='bank';
  document.getElementById('accCurrency').value='EUR';
  document.getElementById('accDelBtn').style.display='none';
  selAccEmoji=ACC_EMOJIS[0];
  buildGrid('accEmoji',ACC_EMOJIS,'acc');
  document.getElementById('accOverlay').classList.add('open');
}

function openEditAcc(id) {
  const a=accounts.find(x=>x.id===id); if(!a) return;
  editAccId=id;
  document.getElementById('accShTitle').textContent='Edit Account';
  document.getElementById('accName').value=a.name;
  document.getElementById('accType').value=a.type;
  document.getElementById('accCurrency').value=a.currency;
  document.getElementById('accDelBtn').style.display='';
  selAccEmoji=a.emoji;
  buildGrid('accEmoji',ACC_EMOJIS,'acc');
  document.getElementById('accOverlay').classList.add('open');
}

function closeAccSheet() { document.getElementById('accOverlay').classList.remove('open'); }

function saveAccount() {
  const name=document.getElementById('accName').value.trim();
  const type=document.getElementById('accType').value;
  const currency=document.getElementById('accCurrency').value.trim()||'EUR';
  if(!name){alert('Enter an account name.');return;}
  if(editAccId){
    const i=accounts.findIndex(a=>a.id===editAccId);
    accounts[i]={...accounts[i],name,type,currency,emoji:selAccEmoji};
  } else {
    accounts.push({id:uid(),name,type,currency,emoji:selAccEmoji});
  }
  savAccs(); closeAccSheet(); renderAccounts();
}

function deleteAccount() {
  if(!editAccId||!confirm('Delete account? Transactions remain.'))return;
  accounts=accounts.filter(a=>a.id!==editAccId);
  savAccs(); closeAccSheet(); renderAccounts();
}

// ── Recurring sheet ───────────────────────────────────────────────────
function openAddRecur() {
  editRecurId=null;
  document.getElementById('recurShTitle').textContent='New Recurring';
  document.getElementById('recurName').value='';
  document.getElementById('recurAmount').value='';
  document.getElementById('recurDay').value='1';
  document.getElementById('recurFreq').value='monthly';
  document.getElementById('recurDelBtn').style.display='none';
  setRecurType('expense');
  fillAccSelect('recurAccount');
  document.getElementById('recurOverlay').classList.add('open');
}

function openEditRecur(id) {
  const r=recurs.find(x=>x.id===id); if(!r) return;
  editRecurId=id;
  document.getElementById('recurShTitle').textContent='Edit Recurring';
  document.getElementById('recurName').value=r.name;
  document.getElementById('recurAmount').value=r.amount;
  document.getElementById('recurDay').value=r.day||1;
  document.getElementById('recurFreq').value=r.freq;
  document.getElementById('recurDelBtn').style.display='';
  setRecurType(r.type,r.category,r.emoji);
  fillAccSelect('recurAccount',r.account);
  document.getElementById('recurOverlay').classList.add('open');
}

function closeRecurSheet() { document.getElementById('recurOverlay').classList.remove('open'); }

function setRecurType(type, precat, preemoji) {
  curRecurType=type;
  document.getElementById('recurExpBtn').classList.toggle('active',type==='expense');
  document.getElementById('recurIncBtn').classList.toggle('active',type==='income');
  const cats=type==='expense'?EXPENSE_CATS:INCOME_CATS;
  const cs=document.getElementById('recurCat');
  cs.innerHTML=cats.map(c=>'<option>'+c+'</option>').join('');
  if(precat&&cats.includes(precat)) cs.value=precat;
  const emojis=type==='expense'?EXP_EMOJIS:INC_EMOJIS;
  selRecurEmoji=preemoji||emojis[0];
  buildGrid('recurEmoji',emojis,'recur');
}

function saveRecur() {
  const name=document.getElementById('recurName').value.trim();
  const amount=parseFloat(document.getElementById('recurAmount').value);
  const cat=document.getElementById('recurCat').value;
  const freq=document.getElementById('recurFreq').value;
  const day=parseInt(document.getElementById('recurDay').value)||1;
  const account=document.getElementById('recurAccount').value;
  if(!name||!amount||amount<=0){alert('Fill in name and amount.');return;}
  if(editRecurId){
    const i=recurs.findIndex(r=>r.id===editRecurId);
    recurs[i]={...recurs[i],name,amount,category:cat,freq,day,emoji:selRecurEmoji,type:curRecurType,account};
  } else {
    recurs.push({id:uid(),name,amount,category:cat,freq,day,emoji:selRecurEmoji,type:curRecurType,account});
  }
  savRecurs(); closeRecurSheet(); renderRecurring();
}

function deleteRecur() {
  if(!editRecurId||!confirm('Delete this template?'))return;
  recurs=recurs.filter(r=>r.id!==editRecurId);
  savRecurs(); closeRecurSheet(); renderRecurring();
}

// ── Shared helpers ────────────────────────────────────────────────────
function fillAccSelect(elId, selId) {
  const el=document.getElementById(elId);
  el.innerHTML=accounts.map(a=>'<option value="'+a.id+'">'+a.emoji+' '+a.name+'</option>').join('');
  if(selId) el.value=selId;
}

function buildGrid(elId, emojis, prefix) {
  const sel = prefix==='acc' ? selAccEmoji : selRecurEmoji;
  document.getElementById(elId).innerHTML=emojis.map(e=>
    '<button class="emoji-opt'+(e===sel?' selected':'')+'" onclick="pickEmoji(\''+prefix+'\',\''+e+'\')" type="button">'+e+'</button>'
  ).join('');
}

function pickEmoji(prefix, e) {
  if(prefix==='tx')    { selTxEmoji=e;    document.querySelectorAll('#txEmoji .emoji-opt').forEach(el=>el.classList.toggle('selected',el.textContent===e)); }
  if(prefix==='acc')   { selAccEmoji=e;   document.querySelectorAll('#accEmoji .emoji-opt').forEach(el=>el.classList.toggle('selected',el.textContent===e)); }
  if(prefix==='recur') { selRecurEmoji=e; document.querySelectorAll('#recurEmoji .emoji-opt').forEach(el=>el.classList.toggle('selected',el.textContent===e)); }
}

// ── Boot ──────────────────────────────────────────────────────────────
document.getElementById('addTxBtn').addEventListener('click', openAddTx);
document.getElementById('prevMonth').addEventListener('click',()=>{ vm--; if(vm<0){vm=11;vy--;} render(); });
document.getElementById('nextMonth').addEventListener('click',()=>{ vm++; if(vm>11){vm=0;vy++;} render(); });
document.getElementById('txOverlay').addEventListener('click',  e=>{ if(e.target===document.getElementById('txOverlay'))  closeTxSheet(); });
document.getElementById('accOverlay').addEventListener('click', e=>{ if(e.target===document.getElementById('accOverlay')) closeAccSheet(); });
document.getElementById('recurOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('recurOverlay')) closeRecurSheet(); });

render();
setTimeout(checkDue, 800);
</script>

if ('serviceWorker' in navigator) {
  const sw = "const V='bv4';self.addEventListener('install',e=>{e.waitUntil(caches.open(V).then(c=>c.addAll(['/'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(s=>{const k=s.clone();caches.open(V).then(c=>c.put(e.request,k));return s;})).catch(()=>caches.match('/')));});";
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
</script>
